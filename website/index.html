<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaalka | The Geometry of Time</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-theme">
    <nav class="pro-nav">
        <div class="nav-content">
            <div class="brand-group">
                <div class="brand-logo"><i data-lucide="clock"></i></div>
                <div class="brand-name">KAALKA</div>
            </div>
            <div class="nav-actions">
                <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
                    <i data-lucide="moon"></i>
                </button>
                <a href="https://github.com/PIYUSH-MISHRA-00/Kaalka-Encryption-Algorithm" target="_blank" class="theme-toggle">
                    <i data-lucide="github"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="page-container">
        <header class="hero-section">
            <h1>Let's Build the <span class="cyan-text">Future</span></h1>
            <p>High-performance time-driven encryption using the geometric principles of the Kaalka Engine.</p>
        </header>

        <section class="main-grid">
            <!-- Left: Clock & Telemetry -->
            <div class="column-left">
                <div class="card">
                    <div class="module-header">
                        <span>Temporal Origin</span>
                    </div>
                    <div class="clock-wrap">
                        <canvas id="analogClock" width="400" height="400"></canvas>
                        <div id="timeDisplay">00:00:00</div>
                        <button id="syncBtn" class="btn btn-outline">Sync System Clock</button>
                    </div>
                </div>

                <div class="card" style="margin-top: 30px;">
                    <div class="module-header">
                        <span>Protocol Monitor</span>
                    </div>
                    <div class="monitor-grid">
                        <div class="monitor-item">
                            <label>H/M Angle</label>
                            <span id="angleHM">0.00°</span>
                        </div>
                        <div class="monitor-item">
                            <label>M/S Angle</label>
                            <span id="angleMS">0.00°</span>
                        </div>
                        <div class="monitor-item">
                            <label>Trig Engine</label>
                            <span id="trigOp">SIN/COS</span>
                        </div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="entropyBar"></div>
                    </div>
                </div>
            </div>

            <!-- Right: Playground -->
            <div class="column-right">
                <div class="card playground-card">
                    <div class="tab-btns">
                        <button class="tab-btn active" data-mode="basic">Standard Mode</button>
                        <button class="tab-btn" data-mode="envelope">Envelope (Seal)</button>
                    </div>

                    <div id="standardTab" class="tab-pane">
                        <div class="field-group">
                            <label>Input Message</label>
                            <textarea id="inputData" placeholder="Enter message to weave into time..."></textarea>
                        </div>
                        <div class="btn-group">
                            <button id="encryptBtn" class="btn btn-primary">Encrypt</button>
                            <button id="decryptBtn" class="btn btn-outline">Decrypt</button>
                        </div>
                    </div>

                    <div id="envelopeTab" class="tab-pane" style="display: none;">
                        <div class="field-group">
                            <label>Recipient Beacon</label>
                            <input type="text" id="recipientBeacon" placeholder="Paste Sundial Beacon (Base64)...">
                        </div>
                        <div class="field-group">
                            <label>Envelope Payload</label>
                            <textarea id="envInput" placeholder="Enter message to seal in temporal envelope..."></textarea>
                        </div>
                        <div class="btn-group">
                            <button id="sealBtn" class="btn btn-primary">Seal Envelope</button>
                            <button id="genSundial" class="btn btn-outline">Generate Sundial</button>
                        </div>
                    </div>

                    <div class="output-area" style="margin-top: 20px;">
                        <div class="module-header">
                            <span>Weave Result</span>
                            <button id="copyBtn" class="copy-pill">
                                <i data-lucide="copy" class="copy-icon"></i>
                                <span class="copy-text">Copy</span>
                            </button>
                        </div>
                        <textarea id="outputData" readonly placeholder="Cryptographic result will appear here..."></textarea>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="pro-footer">
        <div class="footer-content">
            <p>© 2026 Kaalka Encryption Engine. Designed for Performance.</p>
        </div>
    </footer>

    <script src="kaalka_web.js"></script>
    <script src="app.js"></script>
</body>
</html>
